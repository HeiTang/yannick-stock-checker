name: Run Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    name: Run Tests & Check Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov respx "genbadge[coverage]"

      - name: Run Ruff Lint and Format Checks
        run: |
          ruff check .
          ruff format --check .

      - name: Run Tests (Check Coverage)
        run: |
          pytest --cov=app tests/ --cov-report=term-missing --cov-report=xml

      - name: Generate Coverage Badge
        run: genbadge coverage -i coverage.xml -o coverage.svg

      - name: Commit Coverage Badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(coverage): update coverage badge [skip ci]"
          file_pattern: coverage.svg

  frontend-test:
    name: Run Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Frontend Tests
        run: npm test
